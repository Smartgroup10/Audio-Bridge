; =============================================================================
; Asterisk Dialplan - Integración con Audio Bridge
; Smartgroup - Proyecto Automatización Notarías
;
; Este contexto se añade al dialplan existente de vuestra centralita.
; Las llamadas entrantes de notarías que cumplan las condiciones
; se derivan al Audio Bridge para conectar con la IA.
; =============================================================================

[notarias-ia]
; -------------------------------------------------------------------
; Entrada principal: llamadas desviadas desde PBX de notarías
; El DDI de origen (${CALLERID(dnid)} o ${SIP_HEADER(X-DDI-Origin)})
; identifica la notaría.
; -------------------------------------------------------------------

exten => _X.,1,NoOp(=== Llamada entrante notaría: CallerID=${CALLERID(all)} DDI=${CALLERID(dnid)} ===)
 same => n,Set(DDI_ORIGIN=${CALLERID(dnid)})
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(CALL_UUID=${SHELL(uuidgen | tr -d '\n')})

; --- Identificar notaría por DDI ---
; Notaría N001 - Barcelona (934001234, 934001235)
 same => n,GotoIf($["${DDI_ORIGIN}" = "934001234"]?set_n001)
 same => n,GotoIf($["${DDI_ORIGIN}" = "934001235"]?set_n001)
; Notaría N002 - Madrid (912005678)
 same => n,GotoIf($["${DDI_ORIGIN}" = "912005678"]?set_n002)
; DDI no reconocido - tratar como llamada normal
 same => n,Goto(notarias-fallback,${EXTEN},1)

; --- Configuración por notaría ---
 same => n(set_n001),Set(NOTARIA_ID=N001)
 same => n,Set(NOTARIA_NAME=Garcia Lopez Barcelona)
 same => n,Set(TRANSFER_DEFAULT=201)
 same => n,Set(TRUNK_RETURN=trunk-notaria-n001)
 same => n,Goto(check_schedule)

 same => n(set_n002),Set(NOTARIA_ID=N002)
 same => n,Set(NOTARIA_NAME=Martinez Ruiz Madrid)
 same => n,Set(TRANSFER_DEFAULT=100)
 same => n,Set(TRUNK_RETURN=trunk-notaria-n002)
 same => n,Goto(check_schedule)

; --- Evaluar horario ---
 same => n(check_schedule),NoOp(Notaria: ${NOTARIA_ID} - Evaluando horario)
 same => n,GotoIfTime(09:00-14:00,mon-fri,*,*?business_hours)
 same => n,GotoIfTime(16:00-19:00,mon-fri,*,*?business_hours)
 same => n,Set(SCHEDULE=after_hours)
 same => n,Goto(send_to_bridge)

 same => n(business_hours),Set(SCHEDULE=business_hours)
 same => n,Goto(send_to_bridge)

; --- Enviar al Audio Bridge ---
 same => n(send_to_bridge),NoOp(=== Enviando a Bridge: UUID=${CALL_UUID} Notaria=${NOTARIA_ID} Schedule=${SCHEDULE} ===)
; Reproducir aviso legal GDPR antes de conectar con IA
 same => n,Playback(custom/aviso-legal-notaria)
; Conectar con el Audio Bridge via AudioSocket
; Formato: AudioSocket(<uuid>,<bridge_host>:<bridge_port>)
 same => n,AudioSocket(${CALL_UUID},bridge-server:9092)
; Si AudioSocket falla o la IA no responde, fallback a la notaría
 same => n,NoOp(=== AudioSocket finalizado, transfiriendo a fallback ===)
 same => n,Goto(notarias-fallback,${EXTEN},1)


; =============================================================================
; Contexto de fallback: transferencia directa a la notaría
; Se usa cuando la IA no está disponible o cuando AudioSocket falla
; =============================================================================
[notarias-fallback]
exten => _X.,1,NoOp(=== Fallback: transfiriendo a notaría ${NOTARIA_ID} ext ${TRANSFER_DEFAULT} ===)
 same => n,Playback(custom/transferring)
 same => n,Dial(SIP/${TRANSFER_DEFAULT}@${TRUNK_RETURN},30,tT)
 same => n,Hangup()


; =============================================================================
; Contexto para llamadas salientes originadas por el Bridge (callbacks)
; El Bridge usa AMI Originate con Application=AudioSocket
; No necesita dialplan adicional ya que Originate usa AudioSocket directamente
; =============================================================================
[notarias-outbound]
exten => _X.,1,NoOp(=== Outbound callback: ${CALLERID(all)} -> ${EXTEN} ===)
; AMD - Answering Machine Detection (Nivel 1)
 same => n,AMD()
 same => n,GotoIf($["${AMDSTATUS}" = "MACHINE"]?machine)
; Persona detectada - conectar con Bridge
 same => n,AudioSocket(${CALL_UUID},bridge-server:9092)
 same => n,Hangup()
; Máquina/buzón - colgar
 same => n(machine),NoOp(AMD detected machine, hanging up)
 same => n,Hangup()


; =============================================================================
; NOTAS DE CONFIGURACIÓN
; =============================================================================
; 1. Cambiar "bridge-server" por la IP real del servidor del Audio Bridge
; 2. Grabar el audio custom/aviso-legal-notaria con el texto legal GDPR
; 3. Los trunks "trunk-notaria-NXXX" deben estar configurados en sip.conf/pjsip.conf
; 4. Asegurar que el módulo res_audiosocket está cargado:
;    CLI> module load res_audiosocket.so
; 5. Configurar AMI para el Bridge en manager.conf:
;
;    [bridge]
;    secret = changeme_ami_password
;    deny = 0.0.0.0/0.0.0.0
;    permit = 192.168.1.0/255.255.255.0   ; IP del Bridge
;    read = system,call,log,agent,user
;    write = system,call,agent,user,originate
;
