; =============================================================================
; Audio Bridge — Dialplan Template para PekePBX Multi-Tenant
; =============================================================================
;
; INSTRUCCIONES:
; 1. Copiar este archivo a /etc/asterisk/custom/{TENANT_ID}.conf
; 2. Reemplazar {TENANT_ID} por el ID del tenant (ej: 20242)
; 3. Reemplazar {NOTARIA_ID} por el ID de la notaria en el bridge (ej: NOT001)
; 4. Reemplazar {DDI_PATTERN} por el patron DDI que activa la IA (ej: 934001234)
; 5. Reemplazar {FALLBACK_EXT} por la extension de fallback (ej: 200)
; 6. Ejecutar: asterisk -rx "dialplan reload"
;
; REQUISITOS:
; - Notaria dada de alta en el bridge (panel admin o config.yaml)
; - API key configurada en el bridge (X-API-Key header)
; - AudioSocket module cargado en Asterisk (res_audiosocket + app_audiosocket)
;
; =============================================================================

[sub_custom_{TENANT_ID}_pstn_in]
; --- Audio Bridge IA para notaria {NOTARIA_ID} ---
; Intercepta llamadas al DDI configurado y conecta con la IA
;
; Variables disponibles de PekePBX:
;   ${CALLER}       = numero del llamante
;   ${CALLEE}       = DDI destino
;   ${DST_COMPANY}  = tenant ID

; Solo activar para el DDI de la IA
exten => {DDI_PATTERN},1,NoOp(=== Audio Bridge IA - Tenant ${DST_COMPANY} ===)
 same => n,Set(NOTARIA_ID={NOTARIA_ID})
 same => n,Set(AB_API_KEY=changeme_api_key)
 same => n,Set(AB_HOST=127.0.0.1:8080)
 same => n,Set(AB_SOCKET=127.0.0.1:9092)

 ; Generar UUID para la sesion
 same => n,Set(CALL_UUID=${SHELL(uuidgen)})
 same => n,Set(CALL_UUID=${FILTER(a-z0-9-,${CALL_UUID})})

 ; Pre-crear la llamada en el bridge con metadata
 same => n,Set(CURL_RESULT=${SHELL(curl -s -X POST http://${AB_HOST}/api/v1/calls/precreate -H "X-API-Key: ${AB_API_KEY}" -H "Content-Type: application/x-www-form-urlencoded" -d "uuid=${CALL_UUID}&notaria_id=${NOTARIA_ID}&caller_id=${CALLER}&ddi=${CALLEE}&channel=${CHANNEL}")})
 same => n,NoOp(Precreate result: ${CURL_RESULT})

 ; Conectar AudioSocket al bridge
 same => n,AudioSocket(${CALL_UUID},${AB_SOCKET})

 ; Si AudioSocket termina (transfer/hangup de la IA), el dialplan continua aqui
 ; La IA puede haber transferido via AMI, en cuyo caso el canal ya no existe
 same => n,Hangup()

; Fallback: si el DDI NO coincide, seguir dialplan normal
exten => _X.,1,Return()


